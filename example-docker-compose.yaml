version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: homeops-db
    environment:
      POSTGRES_DB: homeops
      POSTGRES_USER: homeops
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  homeops-app:
    image: raddadengineer/homeops-lab:latest
    container_name: homeops-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://homeops:${DB_PASSWORD:-12345}@db:5432/homeops
      SESSION_SECRET: ${SESSION_SECRET:-your_random_secret_string}
    ports:
      - '5000:5000'
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
